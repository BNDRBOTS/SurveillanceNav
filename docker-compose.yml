# Local/dev stack: PostGIS + Redis + MinIO + STN.
# `docker compose up` → app on http://localhost:4000 (migrated + seeded).
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: stn
      POSTGRES_PASSWORD: stn_dev_password
      POSTGRES_DB: stn
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stn -d stn']
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: stn-minio
      MINIO_ROOT_PASSWORD: stn-minio-secret
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      PUBLIC_URL: http://localhost:4000
      DATABASE_URL: postgres://stn:stn_dev_password@db:5432/stn
      REDIS_URL: redis://redis:6379
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: stn
      S3_ACCESS_KEY_ID: stn-minio
      S3_SECRET_ACCESS_KEY: stn-minio-secret
      JWT_SECRET: ${JWT_SECRET:-compose-dev-only-jwt-secret-change-me!!}
      REFRESH_SECRET: ${REFRESH_SECRET:-compose-dev-only-refresh-secret-change!!}
      DOWNLOAD_SECRET: ${DOWNLOAD_SECRET:-compose-dev-only-download-secret-chg!!}
      COOKIE_SECURE: 'false'
      MAIL_TRANSPORT: outbox
      AUTO_MIGRATE: 'true'
    ports:
      - '4000:4000'

volumes:
  db-data:
  minio-data:
